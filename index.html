<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>爱心祝福</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Microsoft YaHei', sans-serif;
            overflow: hidden;
        }
        
        /* 标题 */
        h1 {
            color: white;
            margin-top: 50px;
            font-size: 2em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        /* 工具箱 */
        .toolbox {
            color: rgba(255,255,255,0.8);
            margin: 10px 0 30px;
            font-size: 0.9em;
        }
        
        /* 爱心容器 */
        .heart-container {
            position: relative;
            width: 200px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        /* 点击的爱心 */
        .heart {
            font-size: 100px;
            cursor: pointer;
            animation: heartbeat 1.5s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(255,71,87,0.6));
            transition: transform 0.3s;
            user-select: none;
        }
        
        .heart:active {
            transform: scale(0.9);
        }
        
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        
        /* 祝福语 */
        .blessing {
            position: absolute;
            color: #ffeb3b;
            font-size: 1.2em;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
            animation: floatUp 2s ease-out forwards;
            white-space: nowrap;
        }
        
        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(0.5);
            }
            100% {
                opacity: 0;
                transform: translateY(-150px) scale(1.2);
            }
        }
        
        /* 提示文字 */
        .hint {
            color: rgba(255,255,255,0.7);
            margin-top: 30px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <h1>❤️ 爱心</h1>
    <div class="toolbox">工具箱</div>
    
    <div class="heart-container">
        <div class="heart" onclick="showBlessing()">❤️</div>
    </div>
    
    <p class="hint">点击爱心，收获祝福！</p >
    
    <script>
        // 祝福语数组
        const blessings = [
            "笑口常开！",
            "吉祥如意！",
            "王姐最美了！",
            "美丽动人！",
            "吉祥如意！",
            "心想事成！",
            "万事如意！",
            "平安喜乐！",
            "幸福美满！",
            "好运连连！"
        ];
        
        function showBlessing() {
            const container = document.querySelector('.heart-container');
            const blessing = document.createElement('div');
            
            // 随机选择祝福语
            blessing.textContent = blessings[Math.floor(Math.random() * blessings.length)];
            blessing.className = 'blessing';
            
            // 随机位置（爱心周围）
            const angle = Math.random() * Math.PI * 2;
            const distance = 80 + Math.random() * 40;
            const x = Math.cos(angle) * distance;
            const y = Math.sin(angle) * distance;
            
            blessing.style.left = `calc(50% + ${x}px)`;
            blessing.style.top = `calc(50% + ${y}px)`;
            blessing.style.transform = `translate(-50%, -50%)`;
            
            container.appendChild(blessing);
            
            // 2秒后移除元素
            setTimeout(() => {
                blessing.remove();
            }, 2000);
        }
    </script>
</body>
</html>
