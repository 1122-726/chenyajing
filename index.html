<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>爱心祝福</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            position: relative;
        }
        
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* 背景飘动的小爱心 */
        .floating-heart {
            position: absolute;
            color: rgba(255, 255, 255, 0.3);
            animation: float 10s infinite ease-in-out;
            pointer-events: none;
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg) scale(0.5);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(720deg) scale(1.5);
                opacity: 0;
            }
        }
        
        /* 标题 */
        .title {
            color: white;
            font-size: 2.5em;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
            margin-bottom: 10px;
            animation: glow 2s ease-in-out infinite alternate;
            z-index: 10;
        }
        
        @keyframes glow {
            from { text-shadow: 3px 3px 6px rgba(0,0,0,0.3), 0 0 20px rgba(255,255,255,0.3); }
            to { text-shadow: 3px 3px 6px rgba(0,0,0,0.3), 0 0 40px rgba(255,255,255,0.6), 0 0 60px rgba(255,255,255,0.4); }
        }
        
        .subtitle {
            color: rgba(255,255,255,0.8);
            font-size: 1em;
            margin-bottom: 40px;
            z-index: 10;
        }
        
        /* 主爱心容器 */
        .heart-wrapper {
            position: relative;
            width: 250px;
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        
        /* 主爱心 - 用CSS绘制 */
        .main-heart {
            position: relative;
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 50%, #c44569 100%);
            transform: rotate(-45deg);
            cursor: pointer;
            animation: heartbeat 1.5s ease-in-out infinite;
            box-shadow: 0 0 40px rgba(255, 107, 107, 0.6);
            transition: all 0.3s;
        }
        
        .main-heart::before,
        .main-heart::after {
            content: '';
            position: absolute;
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 50%, #c44569 100%);
            border-radius: 50%;
        }
        
        .main-heart::before {
            top: -50px;
            left: 0;
        }
        
        .main-heart::after {
            left: 50px;
            top: 0;
        }
        
        .main-heart:hover {
            transform: rotate(-45deg) scale(1.1);
            box-shadow: 0 0 60px rgba(255, 107, 107, 0.8);
        }
        
        .main-heart:active {
            transform: rotate(-45deg) scale(0.9);
        }
        
        @keyframes heartbeat {
            0%, 100% { transform: rotate(-45deg) scale(1); }
            25% { transform: rotate(-45deg) scale(1.05); }
            50% { transform: rotate(-45deg) scale(1); }
            75% { transform: rotate(-45deg) scale(1.05); }
        }
        
        /* 点击时的波纹效果 */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            transform: scale(0);
            animation: rippleEffect 0.6s ease-out;
            pointer-events: none;
        }
        
        @keyframes rippleEffect {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }
        
        /* 粒子效果 */
        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #ffeb3b;
            border-radius: 50%;
            pointer-events: none;
            animation: particleExplode 1s ease-out forwards;
        }
        
        @keyframes particleExplode {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }
        
        /* 祝福语 */
        .blessing {
            position: absolute;
            color: #fff;
            font-size: 1.4em;
            font-weight: bold;
            text-shadow: 
                0 0 10px rgba(255,255,255,0.8),
                0 0 20px rgba(255,215,0,0.6),
                0 0 30px rgba(255,215,0,0.4);
            pointer-events: none;
            animation: blessingFloat 2.5s ease-out forwards;
            white-space: nowrap;
            z-index: 20;
        }
        
        @keyframes blessingFloat {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.3) rotate(-10deg);
            }
            20% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.2) rotate(5deg);
            }
            50% {
                opacity: 1;
                transform: translate(-50%, -150%) scale(1) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -300%) scale(0.8) rotate(10deg);
            }
        }
        
        /* 计数器 */
        .counter {
            position: fixed;
            bottom: 30px;
            color: rgba(255,255,255,0.7);
            font-size: 0.9em;
            z-index: 10;
        }
        
        .counter span {
            color: #ffeb3b;
            font-size: 1.5em;
            font-weight: bold;
        }
        
        /* 提示 */
        .hint {
            position: fixed;
            bottom: 60px;
            color: rgba(255,255,255,0.6);
            font-size: 0.8em;
            animation: pulse 2s infinite;
            z-index: 10;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
    </style>
</head>
