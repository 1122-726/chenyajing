<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(45deg, #1a1a1a, #2a1f1f, #1f1a1a, #1a1a1a);
            background-size: 400% 400%;
            animation: gradientShift 20s ease infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Microsoft YaHei', sans-serif;
            overflow: hidden;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .floating-ash {
            position: fixed;
            animation: float 12s infinite ease-in-out;
            pointer-events: none;
            z-index: 0;
        }
        
        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg) scale(0.3);
                opacity: 0;
            }
            10% { opacity: 0.7; }
            90% { opacity: 0.3; }
            100% {
                transform: translateY(-100px) rotate(720deg) scale(0.8);
                opacity: 0;
            }
        }
        
        .main-page {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100vh;
            z-index: 10;
        }
        
        .heart-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        
        .heart {
            position: relative;
            width: 200px;
            height: 200px;
            background-color: #4a1515;
            transform: rotate(-45deg);
            box-shadow: 0 0 40px rgba(60, 10, 10, 0.5);
            z-index: 2;
        }
        
        .heart:before,
        .heart:after {
            content: '';
            position: absolute;
            width: 200px;
            height: 200px;
            background-color: #4a1515;
            border-radius: 50%;
        }
        
        .heart:before {
            top: -100px;
            left: 0;
        }
        
        .heart:after {
            top: 0;
            left: 100px;
        }
        
        /* 纸屑地面容器 */
        .confetti-ground {
            position: relative;
            width: 500px;
            height: 120px;
            margin-top: -30px;
            z-index: 1;
            overflow: visible;
        }
        
        /* 单个纸屑 */
        .confetti-piece {
            position: absolute;
            bottom: 0;
            border-radius: 1px;
            opacity: 0.85;
        }
        
        /* 米白色纸屑 */
        .confetti-cream {
            background-color: #f5f0e8;
        }
        
        /* 红色纸屑 */
        .confetti-red {
            background-color: #8b1a1a;
        }
        
        /* 纸屑形状变体 */
        .shape-rect {
            border-radius: 1px;
        }
        
        .shape-circle {
            border-radius: 50%;
        }
        
        .shape-oval {
            border-radius: 50% 30%;
        }
        
        @media (max-width: 768px) {
            .heart, .heart:before, .heart:after {
                width: 150px;
                height: 150px;
            }
            .heart:before { top: -75px; }
            .heart:after { left: 75px; }
            
            .confetti-ground {
                width: 350px;
                height: 90px;
                margin-top: -20px;
            }
        }
    </style>
</head>
<body>
    <div id="floating-ashes"></div>
    
    <div class="main-page">
        <div class="heart-container">
            <div class="heart"></div>
            <!-- 纸屑地面 -->
            <div class="confetti-ground" id="confettiGround"></div>
        </div>
    </div>
    
    <script>
        function createFloatingAshes() {
            const symbols = ['✦', '✧', '•', '◆', '◇', '·'];
            for (let i = 0; i < 20; i++) {
                const ash = document.createElement('div');
                ash.className = 'floating-ash';
                ash.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];
                ash.style.left = Math.random() * 100 + '%';
                ash.style.fontSize = (10 + Math.random() * 24) + 'px';
                ash.style.animationDelay = Math.random() * 12 + 's';
                ash.style.animationDuration = (10 + Math.random() * 8) + 's';
                ash.style.color = `rgba(${80 + Math.random() * 60}, ${50 + Math.random() * 40}, ${50 + Math.random() * 40}, ${0.2 + Math.random() * 0.4})`;
                document.body.appendChild(ash);
            }
        }
        
        // 创建一地纸屑
        function createConfettiGround() {
            const ground = document.getElementById('confettiGround');
            const totalPieces = 150; // 纸屑总数
            
            const shapes = ['shape-rect', 'shape-circle', 'shape-oval'];
            
            for (let i = 0; i < totalPieces; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                
                // 9:1 比例，米白色 vs 红色
                // 90% 米白色，10% 红色
                const isRed = Math.random() < 0.1;
                piece.classList.add(isRed ? 'confetti-red' : 'confetti-cream');
                piece.classList.add(shapes[Math.floor(Math.random() * shapes.length)]);
                
                // 随机大小（小碎片感）
                const width = 3 + Math.random() * 8;
                const height = 2 + Math.random() * 6;
                piece.style.width = width + 'px';
                piece.style.height = height + 'px';
                
                // 随机水平位置（集中在中间，形成堆积感）
                const centerBias = (Math.random() - 0.5) * 0.8; // 偏向中心
                const leftPos = 50 + centerBias * 80 + (Math.random() - 0.5) * 30;
                piece.style.left = Math.max(0, Math.min(95, leftPos)) + '%';
                
                // 随机垂直位置（底部堆积，有层次感）
                const bottomPos = Math.random() * 60; // 0-60px的高度范围内
                piece.style.bottom = bottomPos + 'px';
                
                // 随机旋转
                piece.style.transform = `rotate(${Math.random() * 360}deg)`;
                
                // 随机透明度差异，增加层次感
                piece.style.opacity = 0.5 + Math.random() * 0.4;
                
                // 轻微的模糊差异，模拟景深
                if (Math.random() < 0.3) {
                    piece.style.filter = `blur(${0.5  + Math.random()}px)`;
         }
ground.appendChild(piece);
                           }
                 }
              createFloatingAshes( );
createConfettiGround( );
</script>
</body>
</html>
